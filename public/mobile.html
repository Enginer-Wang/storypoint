<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Story Point Estimation</title>
    <style>
      *{margin:0;padding:0;box-sizing:border-box}
      html,body{width:100%;height:100%;overflow-x:hidden}

      body{
        font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
        background:#f4f6f9;
        color:#333;
        display:flex;
        flex-direction:column;
        min-height:100vh;
      }

      /* ===== 导航栏 ===== */
      .navbar{
        background:#182954;
        height:48px;
        display:flex;
        align-items:center;
        padding:0 16px;
        gap:10px;
        color:#fff;
        font-size:15px;
        font-weight:600;
        flex-shrink:0;
        position:sticky;
        top:0;
        z-index:100;
      }
      .navbar svg{flex-shrink:0}

      /* ===== 主体 ===== */
      .main{
        flex:1;
        padding:16px;
        max-width:480px;
        width:100%;
        margin:0 auto;
      }

      /* ===== 卡片 ===== */
      .card{
        background:#fff;
        border-radius:8px;
        box-shadow:0 1px 4px rgba(0,0,0,.08);
        padding:20px;
        margin-bottom:16px;
      }

      .section-label{
        font-size:12px;
        font-weight:600;
        color:#888;
        text-transform:uppercase;
        letter-spacing:.5px;
        margin-bottom:10px;
      }

      /* ===== Info Block ===== */
      .info-block{
        background:#f9fafb;
        border:1px solid #e5e7eb;
        border-radius:6px;
        padding:12px 14px;
        margin-bottom:12px;
      }
      .info-block-label{font-size:11px;color:#888;margin-bottom:3px;font-weight:500}
      .info-block-value{font-size:15px;font-weight:600;color:#182954}

      /* ===== 表单 ===== */
      .form-input{
        width:100%;
        height:44px;
        padding:0 14px;
        border:1px solid #d0d5dd;
        border-radius:6px;
        font-size:15px;
        color:#333;
        background:#fff;
        margin-bottom:12px;
        -webkit-appearance:none;
      }
      .form-input:focus{
        outline:none;
        border-color:#182954;
        box-shadow:0 0 0 3px rgba(24,41,84,.1);
      }

      /* ===== 按钮 ===== */
      .btn{
        display:flex;
        align-items:center;
        justify-content:center;
        gap:6px;
        width:100%;
        height:44px;
        border:none;
        border-radius:6px;
        font-size:15px;
        font-weight:600;
        cursor:pointer;
        transition:background .2s;
        margin-bottom:10px;
      }
      .btn-primary{background:#182954;color:#fff}
      .btn-primary:hover{background:#1e3469}
      .btn-secondary{background:#fff;color:#182954;border:1px solid #d0d5dd}
      .btn-secondary:hover{background:#f4f6f9}
      .btn-success{background:#16a34a;color:#fff}

      /* ===== Role Tab ===== */
      .role-tabs{
        display:flex;
        gap:0;
        margin-bottom:14px;
        border-radius:8px;
        overflow:hidden;
        border:2px solid #182954;
      }
      .role-tab{
        flex:1;
        height:42px;
        display:flex;
        align-items:center;
        justify-content:center;
        font-size:13px;
        font-weight:600;
        color:#182954;
        background:#fff;
        cursor:pointer;
        transition:all .2s;
        border-right:1px solid #182954;
        position:relative;
      }
      .role-tab:last-child{border-right:none}
      .role-tab.active{
        background:#182954;
        color:#fff;
      }
      .role-tab .tab-badge{
        position:absolute;
        top:4px;
        right:6px;
        background:#dc2626;
        color:#fff;
        font-size:10px;
        font-weight:700;
        min-width:18px;height:18px;
        border-radius:9px;
        display:flex;align-items:center;justify-content:center;
        padding:0 3px;
      }
      .role-tab .tab-badge.empty{display:none}

      /* ===== 扑克牌网格 ===== */
      .poker-grid{
        display:grid;
        grid-template-columns:repeat(4,1fr);
        gap:10px;
        margin-bottom:16px;
      }
      .poker-card{
        aspect-ratio:.72;
        display:flex;
        flex-direction:column;
        align-items:center;
        justify-content:center;
        background:#fff;
        border:2px solid #182954;
        border-radius:8px;
        font-size:22px;
        font-weight:700;
        color:#182954;
        cursor:pointer;
        transition:all .15s;
        user-select:none;
        position:relative;
      }
      .poker-card .card-sub{
        font-size:10px;
        font-weight:500;
        color:#999;
        margin-top:2px;
      }
      .poker-card:active{transform:scale(.95)}
      .poker-card .card-count{
        position:absolute;
        top:-8px;
        right:-8px;
        background:#dc2626;
        color:#fff;
        font-size:11px;
        font-weight:700;
        min-width:20px;height:20px;
        border-radius:10px;
        display:flex;align-items:center;justify-content:center;
        padding:0 4px;
      }
      .poker-card .card-count.zero{display:none}
      .poker-card.has-count{
        border-color:#182954;
        background:rgba(24,41,84,.06);
      }

      /* ===== 总计栏 ===== */
      .total-bar{
        background:#f0f4ff;
        border:1px solid #c7d2fe;
        border-radius:6px;
        padding:14px;
        margin-bottom:14px;
        display:flex;
        align-items:center;
        justify-content:space-between;
      }
      .total-bar-label{font-size:13px;color:#666;font-weight:600}
      .total-bar-value{font-size:24px;font-weight:700;color:#182954}

      /* ===== 摘要卡片 ===== */
      .summary-row{
        display:flex;
        gap:8px;
        margin-bottom:14px;
      }
      .summary-card{
        flex:1;
        background:#182954;
        color:#fff;
        border-radius:8px;
        padding:12px 10px;
        text-align:center;
      }
      .summary-card-label{font-size:10px;text-transform:uppercase;opacity:.7;margin-bottom:4px}
      .summary-card-value{font-size:20px;font-weight:700}
      .summary-card-edit{
        width:50px;height:28px;
        border:1px solid rgba(255,255,255,.3);
        border-radius:4px;
        background:rgba(255,255,255,.15);
        color:#fff;
        font-size:16px;
        font-weight:700;
        text-align:center;
        outline:none;
      }
      .summary-card-edit:focus{border-color:#fff;background:rgba(255,255,255,.25)}

      /* ===== 参与者列表 ===== */
      .p-list{margin-top:12px}
      .p-item{
        display:flex;
        align-items:center;
        gap:10px;
        padding:10px 0;
        border-bottom:1px solid #f0f0f0;
      }
      .p-item:last-child{border-bottom:none}
      .p-avatar{
        width:32px;height:32px;
        border-radius:50%;
        background:#182954;
        color:#fff;
        display:flex;
        align-items:center;
        justify-content:center;
        font-size:13px;
        font-weight:600;
        flex-shrink:0;
      }
      .p-name{font-size:14px;font-weight:600;color:#333;flex:1}
      .p-status-icon{flex-shrink:0}

      /* ===== 提交完成 ===== */
      .done-icon{
        width:56px;height:56px;
        border-radius:50%;
        background:#dcfce7;
        margin:0 auto 16px;
        display:flex;
        align-items:center;
        justify-content:center;
      }

      /* ===== 错误提示 ===== */
      .toast{
        position:fixed;
        top:60px;
        left:50%;
        transform:translateX(-50%);
        background:#dc2626;
        color:#fff;
        padding:10px 20px;
        border-radius:6px;
        font-size:14px;
        font-weight:500;
        z-index:200;
        display:none;
        box-shadow:0 4px 12px rgba(0,0,0,.15);
      }
      .toast.show{display:block}

      /* ===== Loading ===== */
      .loading-area{
        text-align:center;
        padding:60px 0;
      }
      .spinner{
        width:36px;height:36px;
        border:3px solid #e5e7eb;
        border-top-color:#182954;
        border-radius:50%;
        animation:spin .8s linear infinite;
        margin:0 auto 12px;
      }
      @keyframes spin{to{transform:rotate(360deg)}}

      .hidden{display:none!important}
    </style>
  </head>
  <body>

    <!-- 导航栏 -->
    <nav class="navbar">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="3"/><path d="M12 8v8"/><path d="M8 12h8"/></svg>
      Story Point Estimation
    </nav>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <div class="main">

      <!-- Loading -->
      <div id="loadingSection" class="loading-area">
        <div class="spinner"></div>
        <div style="font-size:14px;color:#888">Loading session...</div>
      </div>

      <!-- 加入会话 -->
      <div id="joinSection" class="hidden">
        <div class="card">
          <div class="info-block">
            <div class="info-block-label">Story ID</div>
            <div class="info-block-value" id="storyId">—</div>
          </div>
          <input class="form-input" type="text" id="nameInput" placeholder="Your name" maxlength="20" />
          <button class="btn btn-primary" onclick="joinSession()">Join Session</button>
        </div>
      </div>

      <!-- 估算中 -->
      <div id="estimatingSection" class="hidden">
        <div class="card">
          <div class="info-block">
            <div class="info-block-label">Story ID</div>
            <div class="info-block-value" id="storyIdDetail">—</div>
          </div>
          <div style="display:flex;gap:12px;margin-bottom:16px">
            <div class="info-block" style="flex:1;margin-bottom:0">
              <div class="info-block-label">Name</div>
              <div class="info-block-value" id="myName">—</div>
            </div>
          </div>

          <!-- Role Tabs -->
          <div class="section-label">Estimate for each role</div>
          <div class="role-tabs">
            <div class="role-tab active" data-role="FE" onclick="switchRole('FE',this)">FE <span class="tab-badge empty" id="badgeFE"></span></div>
            <div class="role-tab" data-role="BE" onclick="switchRole('BE',this)">BE <span class="tab-badge empty" id="badgeBE"></span></div>
            <div class="role-tab" data-role="QA" onclick="switchRole('QA',this)">QA <span class="tab-badge empty" id="badgeQA"></span></div>
          </div>

          <!-- Poker Cards -->
          <div class="poker-grid" id="pokerGrid"></div>

          <!-- Current role total -->
          <div class="total-bar">
            <span class="total-bar-label"><span id="currentRoleLabel">FE</span> Points</span>
            <span class="total-bar-value" id="currentRoleTotal">0</span>
          </div>

          <!-- Summary: FE + BE + QA -->
          <div class="section-label">Summary</div>
          <div class="summary-row">
            <div class="summary-card">
              <div class="summary-card-label">FE</div>
              <input class="summary-card-edit" id="sumFE" type="number" value="0" min="0" onchange="onSummaryEdit()" onkeyup="onSummaryEdit()" />
            </div>
            <div class="summary-card">
              <div class="summary-card-label">BE</div>
              <input class="summary-card-edit" id="sumBE" type="number" value="0" min="0" onchange="onSummaryEdit()" onkeyup="onSummaryEdit()" />
            </div>
            <div class="summary-card">
              <div class="summary-card-label">QA</div>
              <input class="summary-card-edit" id="sumQA" type="number" value="0" min="0" onchange="onSummaryEdit()" onkeyup="onSummaryEdit()" />
            </div>
          </div>
          <div class="total-bar" style="background:#182954;border-color:#182954">
            <span class="total-bar-label" style="color:rgba(255,255,255,.7)">Grand Total</span>
            <span class="total-bar-value" style="color:#fff" id="grandTotal">0</span>
          </div>

          <div class="section-label">Participants</div>
          <div class="p-list" id="participantsList"></div>

          <div style="display:flex;gap:10px;margin-top:16px">
            <button class="btn btn-primary" style="flex:2" onclick="submitEstimate()">Submit</button>
            <button class="btn btn-secondary" style="flex:1" onclick="clearAll()">Clear</button>
          </div>
        </div>
      </div>

      <!-- 已提交 -->
      <div id="submittedSection" class="hidden">
        <div class="card" style="text-align:center;padding:40px 20px">
          <div class="done-icon">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#16a34a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          </div>
          <div style="font-size:18px;font-weight:600;color:#333;margin-bottom:6px">Submitted</div>
          <div style="font-size:14px;color:#888;margin-bottom:16px">Waiting for other participants...</div>
          <div class="summary-row">
            <div class="summary-card">
              <div class="summary-card-label">FE</div>
              <div class="summary-card-value" id="doneValFE">0</div>
            </div>
            <div class="summary-card">
              <div class="summary-card-label">BE</div>
              <div class="summary-card-value" id="doneValBE">0</div>
            </div>
            <div class="summary-card">
              <div class="summary-card-label">QA</div>
              <div class="summary-card-value" id="doneValQA">0</div>
            </div>
          </div>
        </div>
        <div class="card">
          <div class="section-label">Participants Progress</div>
          <div class="p-list" id="submittedParticipantsList"></div>
        </div>
      </div>

    </div>

    <script>
      let sessionId = null;
      let participantId = null;
      let myName = null;
      let ws = null;

      // 每个角色的卡牌选择数量
      const POINTS = [1, 2, 3, 5, 8, 13, 21];
      const POINT_LABELS = {1:'XS', 2:'S', 3:'S-M', 5:'M', 8:'L', 13:'XL', 21:'XXL'};
      let roleCards = { FE: {}, BE: {}, QA: {} };
      POINTS.forEach(function(p) { roleCards.FE[p]=0; roleCards.BE[p]=0; roleCards.QA[p]=0; });

      let activeRole = 'FE';

      // ===== URL 解析 =====
      function getSessionIdFromUrl() {
        var path = window.location.pathname;
        var match = path.match(/\/join\/(.+)/);
        return match ? match[1] : null;
      }

      // ===== Toast =====
      function showToast(msg) {
        var t = document.getElementById("toast");
        t.textContent = msg;
        t.classList.add("show");
        setTimeout(function() { t.classList.remove("show"); }, 4000);
      }

      // ===== 初始化 =====
      function initializeApp() {
        sessionId = getSessionIdFromUrl();
        if (!sessionId) {
          showToast("Invalid session link");
          document.getElementById("loadingSection").innerHTML = '<div style="text-align:center;padding:60px 0;color:#888">Invalid session. Please scan a valid QR code.</div>';
          return;
        }
        connectWebSocket();
        loadSessionInfo();
      }

      // ===== WebSocket =====
      function connectWebSocket() {
        var proto = location.protocol === "https:" ? "wss" : "ws";
        ws = new WebSocket(proto + "://" + location.host);
        ws.onopen = function() { console.log("WS connected"); };
        ws.onmessage = function(e) {
          var d = JSON.parse(e.data);
          if (d.type === "participant-joined" || d.type === "participant-left" || d.type === "participant-submitted") {
            refreshParticipants();
          }
        };
        ws.onerror = function() { console.error("WS error"); };
      }

      // ===== 加载会话 =====
      function loadSessionInfo() {
        fetch("/api/session/" + sessionId)
          .then(function(r) {
            if (!r.ok) throw new Error("Session not found");
            return r.json();
          })
          .then(function(data) {
            document.getElementById("storyId").textContent = data.storyId;
            document.getElementById("storyIdDetail").textContent = data.storyId;
            document.getElementById("loadingSection").classList.add("hidden");
            document.getElementById("joinSection").classList.remove("hidden");
            refreshParticipants();
          })
          .catch(function() {
            document.getElementById("loadingSection").innerHTML = '<div style="text-align:center;padding:60px 0;color:#dc2626;font-weight:600">Session not found or expired.</div>';
          });
      }

      // ===== 刷新参与者 =====
      function refreshParticipants() {
        fetch("/api/session/" + sessionId)
          .then(function(r) { return r.json(); })
          .then(function(data) {
            renderPList("participantsList", data.participants);
            renderPList("submittedParticipantsList", data.participants);
          });
      }

      function renderPList(elId, participants) {
        var el = document.getElementById(elId);
        if (!el) return;
        if (!participants || participants.length === 0) {
          el.innerHTML = '<div style="padding:12px 0;color:#999;font-size:13px;text-align:center">No participants yet</div>';
          return;
        }
        el.innerHTML = participants.map(function(p) {
          var ini = p.name.charAt(0).toUpperCase();
          var hasSubmitted = p.hasSubmitted;
          var icon = hasSubmitted
            ? '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#16a34a" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>'
            : '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#999" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>';
          return '<div class="p-item">' +
            '<div class="p-avatar">' + ini + '</div>' +
            '<div class="p-name">' + p.name + '</div>' +
            '<div class="p-status-icon">' + icon + '</div>' +
          '</div>';
        }).join("");
      }

      // ===== 加入会话 =====
      function joinSession() {
        var name = document.getElementById("nameInput").value.trim();
        if (!name) { showToast("Please enter your name"); return; }

        fetch("/api/session/" + sessionId + "/join", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name: name }),
        })
          .then(function(r) { return r.json(); })
          .then(function(data) {
            participantId = data.participantId;
            myName = name;
            document.getElementById("myName").textContent = name;

            if (ws && ws.readyState === WebSocket.OPEN) {
              ws.send(JSON.stringify({ type: "join", sessionId: sessionId, name: name, participantId: participantId }));
            }

            document.getElementById("joinSection").classList.add("hidden");
            document.getElementById("estimatingSection").classList.remove("hidden");
            renderPokerGrid();
            refreshParticipants();
          })
          .catch(function() { showToast("Failed to join session"); });
      }

      // ===== Role Tab 切换 =====
      function switchRole(role, el) {
        activeRole = role;
        document.querySelectorAll('.role-tab').forEach(function(t) { t.classList.remove('active'); });
        el.classList.add('active');
        document.getElementById('currentRoleLabel').textContent = role;
        renderPokerGrid();
        updateCurrentRoleTotal();
      }

      // ===== 渲染卡牌 =====
      function renderPokerGrid() {
        var grid = document.getElementById('pokerGrid');
        grid.innerHTML = POINTS.map(function(p) {
          var cnt = roleCards[activeRole][p] || 0;
          var hasClass = cnt > 0 ? 'has-count' : '';
          var countClass = cnt > 0 ? '' : 'zero';
          return '<div class="poker-card ' + hasClass + '" onclick="tapCard(' + p + ')">' +
            '<span class="card-count ' + countClass + '">' + cnt + '</span>' +
            p + '<span class="card-sub">' + POINT_LABELS[p] + '</span>' +
          '</div>';
        }).join('');
      }

      // ===== 点击卡牌：累加 =====
      function tapCard(point) {
        roleCards[activeRole][point] = (roleCards[activeRole][point] || 0) + 1;
        renderPokerGrid();
        updateCurrentRoleTotal();
        updateSummary();
        updateBadges();
      }

      // ===== 计算角色总点数 =====
      function calcRoleTotal(role) {
        var total = 0;
        POINTS.forEach(function(p) { total += (roleCards[role][p] || 0) * p; });
        return total;
      }

      function updateCurrentRoleTotal() {
        document.getElementById('currentRoleTotal').textContent = calcRoleTotal(activeRole);
      }

      function updateSummary() {
        ['FE','BE','QA'].forEach(function(role) {
          document.getElementById('sum' + role).value = calcRoleTotal(role);
        });
        updateGrandTotal();
      }

      function updateGrandTotal() {
        var grand = 0;
        ['FE','BE','QA'].forEach(function(role) {
          grand += parseInt(document.getElementById('sum' + role).value) || 0;
        });
        document.getElementById('grandTotal').textContent = grand;
      }

      function onSummaryEdit() {
        updateGrandTotal();
      }

      function updateBadges() {
        ['FE','BE','QA'].forEach(function(role) {
          var total = calcRoleTotal(role);
          var badge = document.getElementById('badge' + role);
          if (total > 0) {
            badge.textContent = total;
            badge.classList.remove('empty');
          } else {
            badge.classList.add('empty');
          }
        });
      }

      // ===== 清空 =====
      function clearAll() {
        POINTS.forEach(function(p) { roleCards.FE[p]=0; roleCards.BE[p]=0; roleCards.QA[p]=0; });
        renderPokerGrid();
        updateCurrentRoleTotal();
        updateSummary();
        updateBadges();
      }

      // ===== 提交 =====
      function submitEstimate() {
        var fe = parseInt(document.getElementById('sumFE').value) || 0;
        var be = parseInt(document.getElementById('sumBE').value) || 0;
        var qa = parseInt(document.getElementById('sumQA').value) || 0;

        if (fe === 0 && be === 0 && qa === 0) {
          showToast("Please estimate at least one role");
          return;
        }

        fetch("/api/session/" + sessionId + "/submit-points", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ participantId: participantId, fe: fe, be: be, qa: qa }),
        })
          .then(function(r) { return r.json(); })
          .then(function() {
            if (ws && ws.readyState === WebSocket.OPEN) {
              ws.send(JSON.stringify({ type: "points-submitted", sessionId: sessionId, name: myName, fe: fe, be: be, qa: qa }));
            }
            document.getElementById('doneValFE').textContent = fe;
            document.getElementById('doneValBE').textContent = be;
            document.getElementById('doneValQA').textContent = qa;
            document.getElementById("estimatingSection").classList.add("hidden");
            document.getElementById("submittedSection").classList.remove("hidden");
            refreshParticipants();
            setInterval(refreshParticipants, 4000);
          })
          .catch(function() { showToast("Failed to submit"); });
      }

      // ===== 启动 =====
      document.addEventListener("DOMContentLoaded", initializeApp);
    </script>
  </body>
</html>
