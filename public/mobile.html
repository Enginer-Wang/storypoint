<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Story Point Estimation</title>
    <style>
      *{margin:0;padding:0;box-sizing:border-box}
      html,body{width:100%;height:100%;overflow-x:hidden}

      body{
        font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
        background:#f4f6f9;
        color:#333;
        display:flex;
        flex-direction:column;
        min-height:100vh;
      }

      /* ===== 导航栏 ===== */
      .navbar{
        background:#182954;
        height:48px;
        display:flex;
        align-items:center;
        padding:0 16px;
        gap:10px;
        color:#fff;
        font-size:15px;
        font-weight:600;
        flex-shrink:0;
        position:sticky;
        top:0;
        z-index:100;
      }
      .navbar svg{flex-shrink:0}

      /* ===== 主体 ===== */
      .main{
        flex:1;
        padding:16px;
        max-width:480px;
        width:100%;
        margin:0 auto;
      }

      /* ===== 卡片 ===== */
      .card{
        background:#fff;
        border-radius:8px;
        box-shadow:0 1px 4px rgba(0,0,0,.08);
        padding:20px;
        margin-bottom:16px;
      }

      .section-label{
        font-size:12px;
        font-weight:600;
        color:#888;
        text-transform:uppercase;
        letter-spacing:.5px;
        margin-bottom:10px;
      }

      /* ===== Info Block ===== */
      .info-block{
        background:#f9fafb;
        border:1px solid #e5e7eb;
        border-radius:6px;
        padding:12px 14px;
        margin-bottom:12px;
      }
      .info-block-label{font-size:11px;color:#888;margin-bottom:3px;font-weight:500}
      .info-block-value{font-size:15px;font-weight:600;color:#182954}

      /* ===== 表单 ===== */
      .form-input{
        width:100%;
        height:44px;
        padding:0 14px;
        border:1px solid #d0d5dd;
        border-radius:6px;
        font-size:15px;
        color:#333;
        background:#fff;
        margin-bottom:12px;
        -webkit-appearance:none;
      }
      .form-input:focus{
        outline:none;
        border-color:#182954;
        box-shadow:0 0 0 3px rgba(24,41,84,.1);
      }

      /* ===== 按钮 ===== */
      .btn{
        display:flex;
        align-items:center;
        justify-content:center;
        gap:6px;
        width:100%;
        height:44px;
        border:none;
        border-radius:6px;
        font-size:15px;
        font-weight:600;
        cursor:pointer;
        transition:background .2s;
        margin-bottom:10px;
      }
      .btn-primary{background:#182954;color:#fff}
      .btn-primary:hover{background:#1e3469}
      .btn-secondary{background:#fff;color:#182954;border:1px solid #d0d5dd}
      .btn-secondary:hover{background:#f4f6f9}
      .btn-success{background:#16a34a;color:#fff}

      /* ===== 角色选择 ===== */
      .role-group{
        display:flex;
        gap:8px;
        margin-bottom:14px;
      }
      .role-btn{
        flex:1;
        height:42px;
        display:flex;
        align-items:center;
        justify-content:center;
        border:2px solid #d0d5dd;
        border-radius:6px;
        font-size:13px;
        font-weight:600;
        color:#555;
        background:#fff;
        cursor:pointer;
        transition:all .2s;
      }
      .role-btn.active{
        border-color:#182954;
        background:#182954;
        color:#fff;
      }

      /* ===== 扑克牌网格 ===== */
      .poker-grid{
        display:grid;
        grid-template-columns:repeat(4,1fr);
        gap:10px;
        margin-bottom:16px;
      }
      .poker-card{
        aspect-ratio:.72;
        display:flex;
        flex-direction:column;
        align-items:center;
        justify-content:center;
        background:#fff;
        border:2px solid #182954;
        border-radius:8px;
        font-size:22px;
        font-weight:700;
        color:#182954;
        cursor:pointer;
        transition:all .15s;
        user-select:none;
        position:relative;
      }
      .poker-card .card-sub{
        font-size:10px;
        font-weight:500;
        color:#999;
        margin-top:4px;
      }
      .poker-card:active{transform:scale(.95)}
      .poker-card.selected{
        border-color:#182954;
        background:#182954;
        color:#fff;
        box-shadow:0 4px 12px rgba(24,41,84,.3);
      }
      .poker-card.selected .card-sub{color:rgba(255,255,255,.7)}

      /* ===== 选中信息 ===== */
      .selection-bar{
        display:none;
        background:#f0f4ff;
        border:1px solid #c7d2fe;
        border-radius:6px;
        padding:14px;
        margin-bottom:14px;
        text-align:center;
      }
      .selection-bar.active{display:block}
      .selection-bar-label{font-size:12px;color:#666;margin-bottom:4px}
      .selection-bar-value{font-size:28px;font-weight:700;color:#182954}

      /* ===== 参与者列表 ===== */
      .p-list{
        margin-top:12px;
      }
      .p-item{
        display:flex;
        align-items:center;
        gap:10px;
        padding:10px 0;
        border-bottom:1px solid #f0f0f0;
      }
      .p-item:last-child{border-bottom:none}
      .p-avatar{
        width:32px;height:32px;
        border-radius:50%;
        background:#182954;
        color:#fff;
        display:flex;
        align-items:center;
        justify-content:center;
        font-size:13px;
        font-weight:600;
        flex-shrink:0;
      }
      .p-avatar.fe{background:#2563eb}
      .p-avatar.be{background:#7c3aed}
      .p-avatar.qa{background:#0d9488}
      .p-name{font-size:14px;font-weight:600;color:#333;flex:1}
      .p-role-tag{
        font-size:11px;
        padding:2px 8px;
        border-radius:10px;
        font-weight:600;
      }
      .p-role-tag.fe{background:#dbeafe;color:#2563eb}
      .p-role-tag.be{background:#ede9fe;color:#7c3aed}
      .p-role-tag.qa{background:#ccfbf1;color:#0d9488}

      /* ===== 提交完成 ===== */
      .done-icon{
        width:56px;height:56px;
        border-radius:50%;
        background:#dcfce7;
        margin:0 auto 16px;
        display:flex;
        align-items:center;
        justify-content:center;
      }

      /* ===== 错误提示 ===== */
      .toast{
        position:fixed;
        top:60px;
        left:50%;
        transform:translateX(-50%);
        background:#dc2626;
        color:#fff;
        padding:10px 20px;
        border-radius:6px;
        font-size:14px;
        font-weight:500;
        z-index:200;
        display:none;
        box-shadow:0 4px 12px rgba(0,0,0,.15);
      }
      .toast.show{display:block}

      /* ===== Loading ===== */
      .loading-area{
        text-align:center;
        padding:60px 0;
      }
      .spinner{
        width:36px;height:36px;
        border:3px solid #e5e7eb;
        border-top-color:#182954;
        border-radius:50%;
        animation:spin .8s linear infinite;
        margin:0 auto 12px;
      }
      @keyframes spin{to{transform:rotate(360deg)}}

      .hidden{display:none!important}
    </style>
  </head>
  <body>

    <!-- 导航栏 -->
    <nav class="navbar">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="3"/><path d="M12 8v8"/><path d="M8 12h8"/></svg>
      Story Point Estimation
    </nav>

    <!-- Toast 错误提示 -->
    <div class="toast" id="toast"></div>

    <div class="main">

      <!-- Loading -->
      <div id="loadingSection" class="loading-area">
        <div class="spinner"></div>
        <div style="font-size:14px;color:#888">Loading session...</div>
      </div>

      <!-- 加入会话 -->
      <div id="joinSection" class="hidden">
        <div class="card">
          <div class="info-block">
            <div class="info-block-label">Story ID</div>
            <div class="info-block-value" id="storyId">—</div>
          </div>

          <input class="form-input" type="text" id="nameInput" placeholder="Your name" maxlength="20" />

          <div class="section-label">Select Role</div>
          <div class="role-group">
            <div class="role-btn" data-role="FE" onclick="pickRole(this)">FE</div>
            <div class="role-btn" data-role="BE" onclick="pickRole(this)">BE</div>
            <div class="role-btn" data-role="QA" onclick="pickRole(this)">QA</div>
          </div>

          <button class="btn btn-primary" onclick="joinSession()">Join Session</button>
        </div>
      </div>

      <!-- 估算中 -->
      <div id="estimatingSection" class="hidden">
        <div class="card">
          <div class="info-block">
            <div class="info-block-label">Story ID</div>
            <div class="info-block-value" id="storyIdDetail">—</div>
          </div>
          <div style="display:flex;gap:12px;margin-bottom:16px">
            <div class="info-block" style="flex:1;margin-bottom:0">
              <div class="info-block-label">Name</div>
              <div class="info-block-value" id="myName">—</div>
            </div>
            <div class="info-block" style="flex:1;margin-bottom:0">
              <div class="info-block-label">Role</div>
              <div class="info-block-value" id="myRole">—</div>
            </div>
          </div>

          <div class="section-label">Select Story Points</div>
          <div class="poker-grid">
            <div class="poker-card" onclick="selectPoint(this,1)">1<span class="card-sub">XS</span></div>
            <div class="poker-card" onclick="selectPoint(this,2)">2<span class="card-sub">S</span></div>
            <div class="poker-card" onclick="selectPoint(this,3)">3<span class="card-sub">S-M</span></div>
            <div class="poker-card" onclick="selectPoint(this,5)">5<span class="card-sub">M</span></div>
            <div class="poker-card" onclick="selectPoint(this,8)">8<span class="card-sub">L</span></div>
            <div class="poker-card" onclick="selectPoint(this,13)">13<span class="card-sub">XL</span></div>
            <div class="poker-card" onclick="selectPoint(this,21)">21<span class="card-sub">XXL</span></div>
          </div>

          <div class="selection-bar" id="selectionBar">
            <div class="selection-bar-label">Your Pick</div>
            <div class="selection-bar-value" id="selectedValue">0</div>
          </div>

          <div class="section-label">Participants</div>
          <div class="p-list" id="participantsList"></div>

          <div style="display:flex;gap:10px;margin-top:16px">
            <button class="btn btn-primary" style="flex:2" onclick="submitEstimate()">Submit</button>
            <button class="btn btn-secondary" style="flex:1" onclick="cancelEstimate()">Clear</button>
          </div>
        </div>
      </div>

      <!-- 已提交 -->
      <div id="submittedSection" class="hidden">
        <div class="card" style="text-align:center;padding:40px 20px">
          <div class="done-icon">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#16a34a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          </div>
          <div style="font-size:18px;font-weight:600;color:#333;margin-bottom:6px">Submitted</div>
          <div style="font-size:14px;color:#888">Waiting for other participants...</div>
        </div>
        <div class="card">
          <div class="section-label">Participants Progress</div>
          <div class="p-list" id="submittedParticipantsList"></div>
        </div>
      </div>

    </div>

    <script>
      let sessionId = null;
      let participantId = null;
      let selectedRole = null;
      let selectedPoint = null;
      let myName = null;
      let ws = null;

      // ===== URL 解析 =====
      function getSessionIdFromUrl() {
        const path = window.location.pathname;
        const match = path.match(/\/join\/(.+)/);
        return match ? match[1] : null;
      }

      // ===== Toast =====
      function showToast(msg) {
        const t = document.getElementById("toast");
        t.textContent = msg;
        t.classList.add("show");
        setTimeout(() => t.classList.remove("show"), 4000);
      }

      // ===== Role 选择 =====
      function pickRole(el) {
        document.querySelectorAll(".role-btn").forEach(b => b.classList.remove("active"));
        el.classList.add("active");
        selectedRole = el.dataset.role;
      }

      // ===== 初始化 =====
      function initializeApp() {
        sessionId = getSessionIdFromUrl();
        if (!sessionId) {
          showToast("Invalid session link");
          document.getElementById("loadingSection").innerHTML = '<div style="text-align:center;padding:60px 0;color:#888">Invalid session. Please scan a valid QR code.</div>';
          return;
        }
        connectWebSocket();
        loadSessionInfo();
      }

      // ===== WebSocket =====
      function connectWebSocket() {
        const proto = location.protocol === "https:" ? "wss" : "ws";
        ws = new WebSocket(proto + "://" + location.host);
        ws.onopen = () => console.log("WS connected");
        ws.onmessage = (e) => {
          const d = JSON.parse(e.data);
          if (d.type === "participant-joined" || d.type === "participant-left" || d.type === "participant-submitted") {
            refreshParticipants();
          }
        };
        ws.onerror = () => console.error("WS error");
      }

      // ===== 加载会话 =====
      function loadSessionInfo() {
        fetch("/api/session/" + sessionId)
          .then(r => {
            if (!r.ok) throw new Error("Session not found");
            return r.json();
          })
          .then(data => {
            document.getElementById("storyId").textContent = data.storyId;
            document.getElementById("storyIdDetail").textContent = data.storyId;
            document.getElementById("loadingSection").classList.add("hidden");
            document.getElementById("joinSection").classList.remove("hidden");
            refreshParticipants();
          })
          .catch(() => {
            document.getElementById("loadingSection").innerHTML = '<div style="text-align:center;padding:60px 0;color:#dc2626;font-weight:600">Session not found or expired.</div>';
          });
      }

      // ===== 刷新参与者 =====
      function refreshParticipants() {
        fetch("/api/session/" + sessionId)
          .then(r => r.json())
          .then(data => {
            renderPList("participantsList", data.participants, false);
            renderPList("submittedParticipantsList", data.participants, true);
          });
      }

      function renderPList(elId, participants, showStatus) {
        const el = document.getElementById(elId);
        if (!el) return;
        if (!participants || participants.length === 0) {
          el.innerHTML = '<div style="padding:12px 0;color:#999;font-size:13px;text-align:center">No participants yet</div>';
          return;
        }
        el.innerHTML = participants.map(p => {
          const r = p.role.toLowerCase();
          const ini = p.name.charAt(0).toUpperCase();
          const status = showStatus ? (p.totalPoints ? '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#16a34a" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>' : '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#999" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>') : '';
          return `<div class="p-item">
            <div class="p-avatar ${r}">${ini}</div>
            <div class="p-name">${p.name}</div>
            <span class="p-role-tag ${r}">${p.role}</span>
            ${status}
          </div>`;
        }).join("");
      }

      // ===== 加入会话 =====
      function joinSession() {
        const name = document.getElementById("nameInput").value.trim();
        if (!name) { showToast("Please enter your name"); return; }
        if (!selectedRole) { showToast("Please select a role"); return; }

        fetch("/api/session/" + sessionId + "/join", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name: name, role: selectedRole }),
        })
          .then(r => r.json())
          .then(data => {
            participantId = data.participantId;
            myName = name;
            document.getElementById("myName").textContent = name;
            document.getElementById("myRole").textContent = selectedRole;

            if (ws && ws.readyState === WebSocket.OPEN) {
              ws.send(JSON.stringify({ type: "join", sessionId: sessionId, name: name, role: selectedRole, participantId: participantId }));
            }

            document.getElementById("joinSection").classList.add("hidden");
            document.getElementById("estimatingSection").classList.remove("hidden");
            refreshParticipants();
          })
          .catch(() => showToast("Failed to join session"));
      }

      // ===== 选择点数 =====
      function selectPoint(el, point) {
        if (selectedPoint === point) {
          // 取消选择
          el.classList.remove("selected");
          selectedPoint = null;
          document.getElementById("selectionBar").classList.remove("active");
          return;
        }
        selectedPoint = point;
        document.querySelectorAll(".poker-card").forEach(c => c.classList.remove("selected"));
        el.classList.add("selected");
        document.getElementById("selectedValue").textContent = point;
        document.getElementById("selectionBar").classList.add("active");
      }

      function cancelEstimate() {
        selectedPoint = null;
        document.querySelectorAll(".poker-card").forEach(c => c.classList.remove("selected"));
        document.getElementById("selectionBar").classList.remove("active");
      }

      // ===== 提交 =====
      function submitEstimate() {
        if (selectedPoint === null) { showToast("Please select a point value"); return; }

        fetch("/api/session/" + sessionId + "/submit-points", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ participantId: participantId, points: selectedPoint }),
        })
          .then(r => r.json())
          .then(() => {
            if (ws && ws.readyState === WebSocket.OPEN) {
              ws.send(JSON.stringify({ type: "points-submitted", sessionId: sessionId, name: myName, role: selectedRole, points: selectedPoint }));
            }
            document.getElementById("estimatingSection").classList.add("hidden");
            document.getElementById("submittedSection").classList.remove("hidden");
            refreshParticipants();
            setInterval(refreshParticipants, 4000);
          })
          .catch(() => showToast("Failed to submit"));
      }

      // ===== 启动 =====
      document.addEventListener("DOMContentLoaded", initializeApp);
    </script>
  </body>
</html>
